name: flutter_app_expiry
description: >
  A Flutter package for freelancers and agencies. Set a payment deadline —
  the app locks itself automatically. Includes watermark overlay, custom
  expired screens, and programmatic expiry checks. Ship demos safely.
  Protect your work. No payment, no access.
  
version: 0.0.4
homepage: https://github.com/imjazzdev/flutter_app_expiry
repository: https://github.com/imjazzdev/flutter_app_expiry
issue_tracker: https://github.com/imjazzdev/flutter_app_expiry/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
